<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1B1712">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/images/favicon-32.png" type="image/png">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Journal">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Askal Thapa's Learning Journal - Flappy Bird Clone</title>
    <link rel="stylesheet" href="css/style.css">
</head>


<body>

    <header class="navigation"></header>

    <main class="main-container">
        <section class="hero fade-in" style="padding: 30px 0; text-align: center;">
            <h1>Flappy Clone</h1>
            <p class="subtitle">A classic reimagined for the web</p>
        </section>

        <section class="game-section fade-in">
            <div class="game-container">
                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="320" height="480"></canvas>

                    <!-- UI Overlays -->
                    <div id="startScreen" class="game-overlay">
                        <h2>Flappy Clone</h2>
                        <p>Press Space to Jump</p>
                        <button id="overlayStartBtn" class="btn-game btn-start-overlay">▶ Play</button>
                    </div>

                    <div id="gameOverScreen" class="game-overlay hidden">
                        <h2>Game Over</h2>
                        <div class="score-card">
                            <div class="score-item">
                                <span>Score</span>
                                <span id="currentScore">0</span>
                            </div>
                            <div class="score-item">
                                <span>Best</span>
                                <span id="bestScore">0</span>
                            </div>
                        </div>
                        <button id="restartBtn" class="btn-game btn-restart">↺ Restart</button>
                    </div>

                    <div id="scoreDisplay" class="game-score hidden">0</div>
                </div>

                <div class="game-controls">
                    <label class="toggle-infinite">
                        <input type="checkbox" id="infiniteMode"> Infinite Mode (God Mode)
                    </label>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 Askal Thapa | Computer Science Student | UCA Farnham</p>
            <p class="footer-subtitle">Building the web, one project at a time </p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
